databases:
  - name: movie-platform-db
    databaseName: movie_db
    user: movie_user
    plan: free

services:
  - type: web
    name: movie-platform-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: movie-platform-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
